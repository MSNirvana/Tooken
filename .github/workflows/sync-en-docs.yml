name: Sync Translated Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/*.mdx"
      - "docs/Tooken平台文档.md"
      - "docs.json"
      - "scripts/sync_i18n.py"
  workflow_dispatch:

jobs:
  sync-locales:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync translated pages
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            python3 scripts/sync_i18n.py --all --locales en,ja,ko
          else
            python3 scripts/sync_i18n.py --since-ref "$BEFORE_SHA" --until-ref "$CURRENT_SHA" --locales en,ja,ko
          fi

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain docs/en docs/ja docs/ko)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/en docs/ja docs/ko
            git commit -m "chore(docs): sync translated docs (en/ja/ko)"
            git push
          else
            echo "No locale doc changes detected."
          fi
